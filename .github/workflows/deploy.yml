name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Build e deploy Fly.io
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-production
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy
        run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Cache Playwright (Chromium)
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('tests/package-lock.json') }}

      - name: Instalar dependências E2E
        run: npm ci
        working-directory: tests

      - name: Instalar Playwright (Chromium)
        run: npx playwright install --with-deps chromium
        working-directory: tests

      - name: Testes E2E (smoke pós-deploy)
        run: |
          if [ -z "$E2E_EMAIL" ]; then
            echo "::warning::E2E_EMAIL não configurado — pulando testes E2E"
            exit 0
          fi
          npm test
        working-directory: tests
        env:
          BASE_URL: https://feitu.fly.dev
          E2E_EMAIL: ${{ secrets.E2E_EMAIL }}
          E2E_PASSWORD: ${{ secrets.E2E_PASSWORD }}
