spring.application.name=feitu

# H2 file-based database
spring.datasource.url=jdbc:h2:file:${DB_PATH:./data/feitu};DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.defer-datasource-initialization=true

# SQL init (roda data.sql após JPA criar o schema)
spring.sql.init.mode=always

# H2 Console (dev only — disable in prod via env var)
spring.h2.console.enabled=${H2_CONSOLE_ENABLED:false}
spring.h2.console.path=/h2-console

# Security
jwt.secret=${JWT_SECRET:dev-secret-change-in-production-must-be-at-least-256-bits}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# Push Notifications (VAPID)
push.vapid.public-key=${VAPID_PUBLIC_KEY:}
push.vapid.private-key=${VAPID_PRIVATE_KEY:}
push.vapid.subject=mailto:admin@feitu.app

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never

# Logging
logging.level.com.feitu=INFO
