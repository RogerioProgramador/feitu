services:
  - type: web
    name: feitu
    runtime: docker
    plan: starter
    region: ohio
    dockerfilePath: ./Dockerfile
    healthCheckPath: /actuator/health
    disk:
      name: feitu-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: DB_PATH
        value: /data/feitu
      - key: H2_CONSOLE_ENABLED
        value: "false"
      - key: JWT_SECRET
        sync: false
      - key: VAPID_PUBLIC_KEY
        sync: false
      - key: VAPID_PRIVATE_KEY
        sync: false
