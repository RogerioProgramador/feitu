name: Claude Task Runner

on:
  issues:
    types: [labeled]

jobs:
  claude:
    name: Implementar task
    if: github.event.label.name == 'claude-ready'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Marcar issue como em andamento
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.removeLabel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              name: 'claude-ready'
            }).catch(() => {});
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: ['claude-working']
            });

      - uses: anthropics/claude-code-action@v1
        id: claude
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          label_trigger: claude-ready

      - name: Criar PR automaticamente
        if: steps.claude.outputs.branch_name != ''
        run: |
          gh pr create \
            --base main \
            --head "${{ steps.claude.outputs.branch_name }}" \
            --title "$(gh issue view ${{ github.event.issue.number }} --json title -q .title)" \
            --body "Closes #${{ github.event.issue.number }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
